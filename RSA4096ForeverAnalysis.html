<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shor_Susceptibility_Analyzer_v1.0</title>
    <style>
        :root { --matrix: #00ff41; --danger: #ff4444; --safe: #00f2fe; }
        body { background: #000; color: #eee; font-family: 'Consolas', monospace; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; border: 1px solid #333; padding: 20px; background: #050505; }
        h1 { color: var(--matrix); border-bottom: 1px solid var(--matrix); padding-bottom: 10px; font-size: 1.2rem; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .stat-card { border: 1px solid #222; padding: 15px; background: #0a0a0a; }
        .value { font-size: 1.5rem; display: block; margin-top: 5px; }
        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .meter { height: 10px; background: #111; margin-top: 10px; position: relative; }
        .fill { height: 100%; background: var(--matrix); width: 0%; transition: 0.5s; }
        #output { margin-top: 20px; padding: 15px; border-left: 3px solid var(--matrix); background: #111; font-size: 0.85rem; line-height: 1.5; }
        .high-risk { color: var(--danger); }
        .low-risk { color: var(--safe); }
    </style>
</head>
<body>
    <div class="container">
        <h1>[ QUANTUM_VULNERABILITY_ASSESSMENT ]</h1>
        <p style="font-size: 0.8rem; color: #666;">Analysis Protocol: RSA-4096 Check</p>
        
        <input type="file" id="targetFile" style="margin: 20px 0; color: #888;">
        <button onclick="analyzeFile()" style="padding: 10px 20px; background: transparent; border: 1px solid var(--matrix); color: var(--matrix); cursor: pointer; font-family: inherit;">EXECUTE_ANALYSIS</button>

        <div class="stat-grid">
            <div class="stat-card">
                <span class="label">Shannon Entropy (H)</span>
                <span id="entropyVal" class="value">0.000</span>
                <div class="meter"><div id="entropyBar" class="fill"></div></div>
            </div>
            <div class="stat-card">
                <span class="label">Geometric Diffusion (D)</span>
                <span id="diffusionVal" class="value">0.0%</span>
                <div class="meter"><div id="diffusionBar" class="fill"></div></div>
            </div>
        </div>

        <div id="output">SYSTEM_IDLE: Awaiting binary input for entropy mapping...</div>
    </div>

    <script>
        async function analyzeFile() {
            const file = document.getElementById('targetFile').files[0];
            if (!file) return;
            const buffer = await file.arrayBuffer();
            const data = new Uint8Array(buffer);
            const log = document.getElementById('output');

            // Calculate Shannon Entropy
            const freq = new Array(256).fill(0);
            for (let i = 0; i < data.length; i++) freq[data[i]]++;
            
            let entropy = 0;
            for (let i = 0; i < 256; i++) {
                if (freq[i] > 0) {
                    let p = freq[i] / data.length;
                    entropy -= p * Math.log2(p);
                }
            }

            // Calculate Geometric Diffusion (Step-wise variance)
            // Measures how much "order" exists between adjacent 256-byte sectors
            let variance = 0;
            const sectorSize = 256;
            for (let i = 0; i < data.length - sectorSize; i += sectorSize) {
                let diff = Math.abs(data[i] - data[i + sectorSize]);
                variance += diff;
            }
            let diffusion = (variance / (data.length / sectorSize)) / 255 * 100;

            // UI Updates
            document.getElementById('entropyVal').textContent = entropy.toFixed(4);
            document.getElementById('entropyBar').style.width = (entropy / 8 * 100) + "%";
            
            document.getElementById('diffusionVal').textContent = Math.min(diffusion, 100).toFixed(1) + "%";
            document.getElementById('diffusionBar').style.width = Math.min(diffusion, 100) + "%";

            // Logic Assessment
            let assessment = "";
            if (entropy > 7.99 && diffusion > 30) {
                assessment = `<span class="low-risk">SUCCESS: HIGH_DIFFUSION DETECTED.</span><br>
                The entropy levels ($H \approx 8$) suggest total bit-whitening. The Hilbert-XOR chain has effectively 
                destroyed the periodic signature of the RSA modular function. Shor's Algorithm will fail to isolate 
                the cycle $r$ because the 'geometric noise' prevents phase estimation.`;
            } else if (entropy > 7.5) {
                assessment = `WARNING: MODERATE_SUSCEPTIBILITY.<br>
                While the RSA wrap is present, the internal data structure shows remaining periodicity. 
                A quantum attacker could potentially use the geometric bias to filter out the noise and find the factorable period.`;
            } else {
                assessment = `<span class="high-risk">CRITICAL: PATTERN_DETECTION_POSITIVE.</span><br>
                Significant linear order detected. Shor's period-finding circuit could likely map this file's modular 
                cycles in $O((\log N)^3)$ time. Full re-scrambling recommended.`;
            }

            log.innerHTML = `<strong>ANALYSIS COMPLETE:</strong><br>${assessment}`;
        }
    </script>
</body>
</html>
